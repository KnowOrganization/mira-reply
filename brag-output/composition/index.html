    <style>
      @font-face {
        font-family: "Archivo Black";

        font-family: "JetBrains Mono";
        src: url("assets/fonts/jetbrains-mono.woff2") format("woff2");
        font-weight: 400 700; font-style: normal; font-display: block;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      :root {
        --gold: #F4A623; --bg: #0A0A0A; --text: #F5F5F0; --muted: #9A9A95;
        --gold-soft: rgba(244,166,35,0.16); --gold-line: rgba(244,166,35,0.5);
      }
      html, body {
        width: 1920px; height: 1080px; overflow: hidden; background: var(--bg);
        font-family: "JetBrains Mono", ui-monospace, monospace; color: var(--text);
        -webkit-font-smoothing: antialiased;
      }
      #root { position: relative; width: 1920px; height: 1080px; overflow: hidden; background: var(--bg); }
      .clip { position: absolute; inset: 0; }
      .void { background:
          radial-gradient(circle at 50% 50%, rgba(244,166,35,0.05), transparent 60%),
          #0A0A0A;
        overflow: hidden; }
      .center { display: grid; place-items: center; }

      .display { font-family: "Archivo Black", "JetBrains Mono", sans-serif; letter-spacing: -0.01em; line-height: 0.96; }

      /* ---------- particles ---------- */
      #field, #fieldB { position: absolute; left: 960px; top: 540px; width: 0; height: 0; }
      .particle { position: absolute; left: 0; top: 0; will-change: transform, opacity; }
      .pdot { border-radius: 50%; background: var(--text); }
      .pgold { background: var(--gold); box-shadow: 0 0 8px rgba(244,166,35,0.7); }
      .pchip {
        transform-origin: center; white-space: nowrap; padding: 9px 14px; border-radius: 12px;
        font-size: 15px; color: var(--muted); background: rgba(255,255,255,0.045);
        border: 1px solid rgba(255,255,255,0.10); box-shadow: 0 18px 50px -22px rgba(0,0,0,0.9);
      }

      /* ---------- core ---------- */
      #coreWrap, #coreWrapD { position: absolute; left: 960px; top: 540px; }
      .core {
        position: absolute; transform: translate(-50%,-50%); width: 56px; height: 56px; border-radius: 50%;
        background: radial-gradient(circle at 50% 42%, #fff 0%, var(--gold) 38%, #b9781a 100%);
        box-shadow: 0 0 60px 8px rgba(244,166,35,0.9), 0 0 160px 40px rgba(244,166,35,0.45);
      }
      .coreGlow {
        position: absolute; transform: translate(-50%,-50%); width: 760px; height: 760px; border-radius: 50%;
        pointer-events: none; filter: blur(14px);
        background: radial-gradient(circle, rgba(244,166,35,0.55) 0%, rgba(244,166,35,0.12) 34%, rgba(244,166,35,0) 66%);

      /* ---------- big type ---------- */
      .hook { font-size: 96px; max-width: 1500px; text-align: center; color: var(--text); }
      .hook .gold { color: var(--gold); }
      .ulabel { font-size: 16px; letter-spacing: 0.42em; text-transform: uppercase; color: var(--muted); }

      /* ---------- scene 3: routing + real inbox row ---------- */
      .net-stage { position: relative; width: 1920px; height: 1080px; }
      .node { position: absolute; width: 12px; height: 12px; border-radius: 50%; background: var(--gold);
        box-shadow: 0 0 14px rgba(244,166,35,0.8); transform: translate(-50%,-50%); }
      .row {
        position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
        width: 540px; padding: 16px 18px; display: flex; gap: 13px; align-items: flex-start;
        background: #16140f; border: 1px solid rgba(244,166,35,0.22); border-radius: 16px;
        box-shadow: 0 40px 120px -30px rgba(0,0,0,0.9), 0 0 60px -20px rgba(244,166,35,0.4);
      }
      .row .accent { position: absolute; left: 0; top: 14px; bottom: 14px; width: 3px; border-radius: 3px; background: var(--gold); }
      .av { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; display: grid; place-items: center;
        font-size: 14px; font-weight: 700; color: var(--gold); background: var(--gold-soft); border: 1px solid rgba(244,166,35,0.3); }
      .row .body { min-width: 0; flex: 1; }
      .row .top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
      .row .name { font-size: 16px; font-weight: 700; color: var(--text); }
      .row .ago { font-size: 12px; color: var(--muted); }
      .row .prev { font-size: 13.5px; color: var(--muted); margin-top: 5px; line-height: 1.35; }
      .row .win { display: flex; align-items: center; gap: 6px; margin-top: 9px; font-size: 11.5px; color: #46c97a; }
      .row .win .clk { width: 9px; height: 9px; border-radius: 50%; border: 2px solid #46c97a; }
      .row .live { display: inline-flex; align-items: center; gap: 5px; font-size: 10.5px; font-weight: 700;
        color: #46c97a; background: rgba(70,201,122,0.12); padding: 3px 8px; border-radius: 999px; }
      .row .live .d { width: 6px; height: 6px; border-radius: 50%; background: #46c97a; }
      .tag {
        position: absolute; left: 50%; top: calc(50% + 70px); transform: translate(-50%,0);
        font-size: 15px; font-weight: 700; color: #1a1305; background: var(--gold);
        padding: 8px 16px; border-radius: 999px; box-shadow: 0 0 36px -4px rgba(244,166,35,0.9); white-space: nowrap;
      }
      .flick { position: absolute; font-size: 14px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold);
        font-weight: 700; transform: translate(-50%,-50%); }

      /* ---------- scene 4: value cards ---------- */
      .vstage { position: relative; width: 1640px; display: flex; gap: 22px; justify-content: center; align-items: stretch; }
      .vcard {
        position: relative; width: 300px; padding: 26px 24px; border-radius: 18px;
        background: #14130f; border: 1px solid rgba(244,166,35,0.2);
        box-shadow: 0 40px 120px -34px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.04);
        display: flex; flex-direction: column; gap: 12px; transform-origin: center bottom;
      }
      .vcard .vtick { width: 30px; height: 3px; border-radius: 3px; background: var(--gold); }
      .vcard .vk { font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
      .vcard .vv { font-family: "Archivo Black", sans-serif; font-size: 30px; color: var(--text); letter-spacing: -0.01em; }
      .vcard .vv .g { color: var(--gold); }
      .vtitle { position: absolute; top: 232px; width: 100%; text-align: center; }

      /* ---------- scene 5: logo ---------- */
      .wordmark { font-family: "Archivo Black", sans-serif; font-size: 220px; color: var(--gold); letter-spacing: -0.02em;
        text-shadow: 0 0 80px rgba(244,166,35,0.5); }
      .tagline { font-size: 24px; letter-spacing: 0.12em; color: var(--muted); margin-top: 18px; }
    </style>

      <audio data-hf-id="hf-7s2a" id="sfx-logo" src="assets/sfx/logo.ogg" data-start="22.20" data-duration="1.6" data-track-index="35" data-volume="0.7"></audio>

    <script>
      // deterministic PRNG — no Math.random (render must be reproducible)
      function mulberry32(a) {
        return function () {
          a |= 0; a = (a + 0x6D2B79F5) | 0;
          let t = Math.imul(a ^ (a >>> 15), 1 | a);
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }
      const rnd = mulberry32(20260624);
      const rr = (lo, hi) => lo + (hi - lo) * rnd();

      // ---- build the particle field (scenes 1+2) ----
      const field = document.getElementById("field");
      const CHIPS = ["do you ship to mumbai?", "collab? we'd pay", "price for the tee?",
                     "is the cap back?", "loved your reel ❤️", "brand partnership"];
      const PARTICLES = [];
      const N = 118;
      for (let i = 0; i < N; i++) {
        const depth = rnd();                       // 0 far … 1 near → parallax
        const ang = rr(0, Math.PI * 2);
        const radius = rr(180, 1180) * (0.55 + depth * 0.7);
        const dx = Math.cos(ang) * radius * 1.5;   // wide field
        const dy = Math.sin(ang) * radius;
        const el = document.createElement("div");
        el.className = "particle pdot" + (rnd() < 0.16 ? " pgold" : "");
        const sz = (rnd() < 0.18 ? rr(4, 7) : rr(1.5, 3.5)) * (0.6 + depth);
        el.style.width = sz + "px"; el.style.height = sz + "px";
        el.dataset.dx = dx; el.dataset.dy = dy; el.dataset.depth = depth;
        el.dataset.op = (0.22 + depth * 0.7).toFixed(3);
        el.dataset.s = (0.6 + depth * 0.8).toFixed(3);
        field.appendChild(el);
        PARTICLES.push(el);
      }
      // 6 readable message chips scattered through the field
      for (let i = 0; i < CHIPS.length; i++) {
        const depth = 0.55 + 0.45 * (i / CHIPS.length);
        const ang = (i / CHIPS.length) * Math.PI * 2 + 0.4;
        const radius = rr(360, 720);
        const dx = Math.cos(ang) * radius * 1.4;
        const dy = Math.sin(ang) * radius * 0.9;
        const el = document.createElement("div");
        el.className = "particle pchip";
        el.textContent = CHIPS[i];
        el.dataset.dx = dx; el.dataset.dy = dy; el.dataset.depth = depth;
        el.dataset.op = "0.9"; el.dataset.s = (0.85 + depth * 0.25).toFixed(3);
        field.appendChild(el);
        PARTICLES.push(el);
      }
      const allP = "#field .particle";

      // ---- scene 3 nodes + connectors (deterministic) ----
      const NS = "http://www.w3.org/2000/svg";
      const cx = 960, cy = 540;
      const nodeWrap = document.getElementById("nodes");
      const svg = document.getElementById("netSvg");
      const NODES = [];
      const nodeCount = 9;
      for (let i = 0; i < nodeCount; i++) {
        const ang = (i / nodeCount) * Math.PI * 2 + 0.3;
        const rad = rr(280, 430);
        const nx = cx + Math.cos(ang) * rad * 1.4;
        const ny = cy + Math.sin(ang) * rad * 0.8;
        const ln = document.createElementNS(NS, "line");
        ln.setAttribute("x1", cx); ln.setAttribute("y1", cy);
        ln.setAttribute("x2", nx); ln.setAttribute("y2", ny);
        ln.setAttribute("stroke", "rgba(244,166,35,0.4)");
        ln.setAttribute("stroke-width", "1.4");
        const len = Math.hypot(nx - cx, ny - cy);
        ln.setAttribute("stroke-dasharray", len);
        ln.setAttribute("stroke-dashoffset", len);
        ln.classList.add("netline");
        svg.appendChild(ln);
        const nd = document.createElement("div");
        nd.className = "node";
        nd.style.left = nx + "px"; nd.style.top = ny + "px";
        nodeWrap.appendChild(nd);
        NODES.push(nd);
      }

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      /* =================== Scene 1+2: flood + collapse (0–10.2) =================== */
      // initial scatter (GSAP owns transform)
      gsap.set(allP, {
        x: (i, el) => +el.dataset.dx, y: (i, el) => +el.dataset.dy,
        scale: (i, el) => +el.dataset.s, opacity: 0,
      });
      gsap.set("#core", { scale: 0, opacity: 0 });
      gsap.set("#coreGlow", { scale: 0, opacity: 0 });

      tl.from("#sA", { opacity: 0, duration: 0.5, ease: "power1.out" }, 0);
      // particles fade in fast (the flood)
      tl.to(allP, { opacity: (i, el) => +el.dataset.op, duration: 0.9, stagger: { each: 0.006, from: "end" }, ease: "power1.out", overwrite: "auto" }, 0.2);
      // parallax drift outward + camera push in (constant motion)
      tl.to(allP, {
        x: (i, el) => +el.dataset.dx * (1.0 + +el.dataset.depth * 0.14),
        y: (i, el) => +el.dataset.dy * (1.0 + +el.dataset.depth * 0.14),
        duration: 5.0, ease: "none", overwrite: "auto",
      }, 0.2);
      tl.fromTo("#cameraA", { scale: 0.92 }, { scale: 1.06, duration: 7.4, ease: "power1.inOut" }, 0);

      // hook line — slam in, HOLD, out
      tl.fromTo("#hook", { opacity: 0, scale: 1.08, y: 12 }, { opacity: 1, scale: 1, y: 0, duration: 0.7, ease: "power3.out" }, 1.0);
      tl.to("#hook", { opacity: 0, scale: 0.98, duration: 0.5, ease: "power1.in" }, 4.4);

      // ---- collapse (5.0 → 7.6) : every particle rushes to the core ----
      tl.to(allP, {
        x: 0, y: 0, scale: 0, opacity: 0,
        duration: 2.3, ease: "power3.in", stagger: { each: 0.006, from: "end" }, overwrite: "auto",
      }, 5.0);
      // compression cue, then ignition
      tl.to("#cameraA", { scale: 1.12, duration: 1.6, ease: "power2.in", overwrite: "auto" }, 6.0);
      tl.fromTo("#core", { scale: 0, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.5, ease: "back.out(2.2)" }, 7.55);
      tl.fromTo("#coreGlow", { scale: 0.2, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.8, ease: "expo.out" }, 7.55);
      // gold core breathes (deterministic — stands in for audio-reactive glow)
      tl.to("#coreGlow", { scale: 1.12, opacity: 0.82, duration: 0.7, yoyo: true, repeat: 1, ease: "sine.inOut" }, 8.4);

      // "MIRA UNDERSTANDS" — slam in on ignition, HOLD
      tl.fromTo("#understand", { opacity: 0, scale: 1.12 }, { opacity: 1, scale: 1, duration: 0.6, ease: "power3.out" }, 7.8);
      tl.to("#understand", { opacity: 0, duration: 0.5, ease: "power1.in" }, 9.6);

      tl.to("#sA", { opacity: 0, duration: 0.4, ease: "power1.in" }, 9.8);
      tl.set("#sA", { opacity: 0 }, 10.2);

      /* =================== Scene 3: routing (10.0–16.4) =================== */
      gsap.set("#nodes .node", { scale: 0, opacity: 0 });
      gsap.set("#row", { opacity: 0, scale: 0.86 });
      gsap.set("#tag", { opacity: 0, scale: 0.6, y: 10 });
      gsap.set(["#fl1", "#fl2", "#fl3"], { opacity: 0, y: 8 });

      tl.from("#sB", { opacity: 0, duration: 0.5, ease: "power1.out" }, 10.0);
      // nodes snap out + connectors draw
      tl.to("#nodes .node", { scale: 1, opacity: 1, duration: 0.5, stagger: 0.05, ease: "back.out(2)" }, 10.25);
      tl.to("#netSvg .netline", { strokeDashoffset: 0, duration: 0.9, stagger: 0.05, ease: "power2.out" }, 10.5);
      // real inbox row surfaces
      tl.to("#row", { opacity: 1, scale: 1, duration: 0.7, ease: "expo.out" }, 11.0);
      // kinetic labels flick along paths
      tl.to("#fl1", { opacity: 1, y: 0, duration: 0.35, ease: "power2.out" }, 11.6);
      tl.to("#fl2", { opacity: 1, y: 0, duration: 0.35, ease: "power2.out" }, 12.3);
      tl.to("#fl3", { opacity: 1, y: 0, duration: 0.35, ease: "power2.out" }, 12.9);
      // gold intent tag locks on
      tl.to("#tag", { opacity: 1, scale: 1, y: 0, duration: 0.45, ease: "back.out(2.4)" }, 12.0);
      tl.to("#row", { boxShadow: "0 40px 120px -30px rgba(0,0,0,0.9), 0 0 80px -14px rgba(244,166,35,0.65)", duration: 0.5, ease: "power2.out" }, 12.0);
      // hold ~1.4s, then route along a lit path into the network (up-right)
      tl.to(["#row", "#tag"], { x: 540, y: -300, scale: 0.42, opacity: 0, duration: 1.0, ease: "power2.in" }, 13.6);
      tl.to(["#fl1", "#fl2", "#fl3"], { opacity: 0, duration: 0.5, ease: "power1.in" }, 14.0);
      tl.to("#nodes .node", { scale: 1.25, duration: 0.3, yoyo: true, repeat: 1, ease: "sine.inOut" }, 14.4);
      tl.to("#sB", { opacity: 0, duration: 0.5, ease: "power1.in" }, 15.9);
      tl.set("#sB", { opacity: 0 }, 16.4);

      /* =================== Scene 4: value cards (16.2–21.2) =================== */
      const VC = ["#vc1", "#vc2", "#vc3", "#vc4", "#vc5"];
      gsap.set(VC, { opacity: 0, scale: 0.6, y: 40 });
      tl.from("#sC", { opacity: 0, duration: 0.5, ease: "power1.out" }, 16.2);
      tl.from("#sCkick", { opacity: 0, y: -10, duration: 0.6, ease: "power2.out" }, 16.3);
      const cardTimes = [16.5, 17.2, 17.9, 18.6, 19.3];
      VC.forEach((sel, i) => {
        tl.to(sel, { opacity: 1, scale: 1, y: 0, duration: 0.55, ease: "back.out(1.8)" }, cardTimes[i]);
      });
      // hold full set, then inhale toward center for the convergence
      tl.to(VC, { opacity: 0, scale: 0.4, y: 0, x: (i) => (2 - i) * 360, duration: 0.7, ease: "power2.in" }, 20.7);
      tl.to("#sC", { opacity: 0, duration: 0.4, ease: "power1.in" }, 20.8);
      tl.set("#sC", { opacity: 0 }, 21.2);

      /* =================== Scene 5: convergence / logo (21.0–24.0) =================== */
      gsap.set("#coreD", { scale: 1, opacity: 1 });
      gsap.set("#coreGlowD", { scale: 1, opacity: 0.9 });
      tl.from("#sD", { opacity: 0, duration: 0.4, ease: "power1.out" }, 21.0);
      // collapse the core to a point…
      tl.to(["#coreD", "#coreGlowD"], { scale: 0.04, duration: 0.9, ease: "power3.in" }, 21.3);
      // …then resolve into the wordmark
      tl.to(["#coreD", "#coreGlowD"], { opacity: 0, duration: 0.3, ease: "power1.in" }, 22.1);
      tl.fromTo("#wordmark", { opacity: 0, scale: 1.18, filter: "blur(8px)" }, { opacity: 1, scale: 1, filter: "blur(0px)", duration: 0.7, ease: "power3.out" }, 22.2);
      tl.fromTo("#tagline", { opacity: 0, y: 14 }, { opacity: 1, y: 0, duration: 0.8, ease: "power2.out" }, 22.9);
      tl.to("#sD", { opacity: 0, duration: 0.3, ease: "power1.in" }, 23.75);

      window.__timelines["main"] = tl;
    </script>
  </body>
